<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>จะเป็นแฟนกันไหม? 💗</title>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Mitr',sans-serif; background:#fff0f5; min-height:100vh; overflow:hidden; }

/* ===== PAGE 1 ===== */
#page1 {
position:fixed; inset:0; display:flex; flex-direction:column;
align-items:center; justify-content:center;
background:linear-gradient(135deg,#ffe4ee 0%,#fff0f8 50%,#fce4ff 100%);
transition:opacity 0.6s ease; z-index:10;
}
.bear-wrap { font-size:90px; animation:bearBounce 2s ease-in-out infinite; margin-bottom:16px; filter:drop-shadow(0 8px 20px rgba(255,100,150,0.3)); }
@keyframes bearBounce { 0%,100%{transform:translateY(0) rotate(-3deg);} 50%{transform:translateY(-14px) rotate(3deg);} }

.q-text { font-size:clamp(20px,5vw,30px); font-weight:600; color:#d63384; text-align:center; margin-bottom:8px; padding:0 20px; }
.sub-text { font-size:15px; color:#e88fb0; margin-bottom:40px; }

.btns { display:flex; gap:20px; align-items:center; flex-wrap:wrap; justify-content:center; padding:0 20px; }
.btn-yes {
background:linear-gradient(135deg,#ff4d8d,#ff80b5); color:white; border:none;
border-radius:50px; padding:16px 38px; font-family:‘Mitr’,sans-serif;
font-size:20px; font-weight:600; cursor:pointer;
box-shadow:0 8px 25px rgba(255,77,141,0.4);
transition:all 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
.btn-yes:hover { transform:scale(1.05); }
.btn-no {
background:white; color:#d63384; border:2px solid #ffb3cc;
border-radius:50px; padding:14px 32px; font-family:‘Mitr’,sans-serif;
font-size:18px; font-weight:500; cursor:pointer;
box-shadow:0 4px 15px rgba(255,100,150,0.15); transition:all 0.3s ease;
}
.fh-bg { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0; }
.fh { position:absolute; opacity:0.15; animation:floatUp linear infinite; }
@keyframes floatUp { 0%{transform:translateY(110vh) rotate(0deg);opacity:0.15;} 100%{transform:translateY(-10vh) rotate(360deg);opacity:0;} }

/* ===== PAGE 2 ===== */
#page2 {
position:fixed; inset:0; opacity:0; pointer-events:none;
transition:opacity 0.8s ease; z-index:5; overflow:hidden;
background:linear-gradient(160deg,#0d0010 0%,#2d0025 40%,#0d001e 100%);
display:flex; flex-direction:column; align-items:center;
}
#page2.active { opacity:1; pointer-events:all; }

/* Scrollable inner */
.p2-inner {
width:100%; max-width:480px; padding:30px 20px 60px;
display:flex; flex-direction:column; align-items:center;
gap:24px; overflow-y:auto; -webkit-overflow-scrolling:touch;
scrollbar-width:none; height:100vh;
}
.p2-inner::-webkit-scrollbar { display:none; }

/* Photo collage */
.photos-wrap {
display:grid; grid-template-columns:1fr 1fr; grid-template-rows:auto auto;
gap:10px; width:100%;
}
.photo-big {
grid-column:1 / -1; border-radius:20px; overflow:hidden;
border:3px solid rgba(255,150,200,0.4);
box-shadow:0 8px 30px rgba(255,80,130,0.4);
animation:photoFloat 4s ease-in-out infinite;
}
.photo-sm {
border-radius:16px; overflow:hidden;
border:3px solid rgba(255,150,200,0.3);
box-shadow:0 6px 20px rgba(255,80,130,0.3);
}
.photo-sm:nth-child(2) { animation:photoFloat 4s ease-in-out infinite 0.5s; }
.photo-sm:nth-child(3) { animation:photoFloat 4s ease-in-out infinite 1s; }
@keyframes photoFloat { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
.photo-big img, .photo-sm img { width:100%; height:100%; object-fit:cover; display:block; }
.photo-big { height:260px; }
.photo-sm { height:180px; }

/* Heart section */
.heart-wrap {
position:relative; display:flex; align-items:center;
justify-content:center; width:200px; height:200px;
}
.big-heart {
font-size:140px; animation:hPulse 1.5s ease-in-out infinite;
filter:drop-shadow(0 0 25px rgba(255,80,130,0.9)) drop-shadow(0 0 50px rgba(255,80,130,0.5));
line-height:1;
}
@keyframes hPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.1);} }
.names-on-heart {
position:absolute; display:flex; flex-direction:column;
align-items:center; gap:2px;
}
.n1,.n2 { font-family:‘Prompt’,sans-serif; font-weight:600; color:white; font-size:clamp(13px,3.5vw,17px); text-shadow:0 2px 8px rgba(0,0,0,0.6); }
.hdivider { font-size:12px; color:#ffb3cc; }
.glow-ring {
position:absolute; width:180px; height:180px; border-radius:50%;
background:radial-gradient(circle,rgba(255,80,130,0.35) 0%,transparent 70%);
animation:gPulse 2s ease-in-out infinite;
}
@keyframes gPulse { 0%,100%{transform:scale(1);opacity:0.7;} 50%{transform:scale(1.3);opacity:1;} }

.title2 { font-size:clamp(20px,5vw,28px); font-weight:600; color:#ffb3d9; text-align:center; text-shadow:0 0 20px rgba(255,150,200,0.6); }
.sub2 { font-size:14px; color:#cc7799; text-align:center; line-height:1.8; }

/* Particles */
.petal { position:fixed; animation:petalFall linear infinite; pointer-events:none; z-index:6; }
@keyframes petalFall {
0%{transform:translateY(-60px) rotate(0deg) translateX(0);opacity:0.9;}
50%{transform:translateY(50vh) rotate(180deg) translateX(30px);opacity:0.7;}
100%{transform:translateY(110vh) rotate(360deg) translateX(-20px);opacity:0;}
}
.sparkle { position:fixed; animation:spAnim ease-in-out infinite; pointer-events:none; z-index:6; }
@keyframes spAnim { 0%,100%{opacity:0;transform:scale(0.5) rotate(0deg);} 50%{opacity:1;transform:scale(1.3) rotate(180deg);} }
.star { position:fixed; width:2px; height:2px; background:white; border-radius:50%; animation:twinkle ease-in-out infinite; z-index:4; }
@keyframes twinkle { 0%,100%{opacity:0.1;} 50%{opacity:0.9;} }
.cfall { position:fixed; border-radius:2px; animation:cFall linear infinite; pointer-events:none; z-index:6; }
@keyframes cFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1;} 100%{transform:translateY(110vh) rotate(720deg);opacity:0;} }

#page1 > * { position:relative; z-index:1; }

/* Audio */
#audio-hint {
position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
background:rgba(255,255,255,0.15); backdrop-filter:blur(10px);
border:1px solid rgba(255,180,210,0.3); border-radius:50px;
padding:8px 20px; color:#ffb3d9; font-size:13px; z-index:20;
cursor:pointer; display:none;
}
</style>

</head>

// Inject images
document.querySelector('.photo-big img').src = IMG1;
document.querySelectorAll('.photo-sm img')[0].src = IMG2;
document.querySelectorAll('.photo-sm img')[1].src = IMG3;

// BG hearts page1
const bgH = document.getElementById('bgH');
const hEmoji = ['💕','🌸','💗','✨','🌷','💖','🩷'];
for(let i=0;i<18;i++){
  const h=document.createElement('div');
  h.className='fh';
  h.textContent=hEmoji[Math.floor(Math.random()*hEmoji.length)];
  h.style.left=Math.random()*100+'%';
  h.style.animationDuration=(6+Math.random()*8)+'s';
  h.style.animationDelay=(-Math.random()*10)+'s';
  h.style.fontSize=(14+Math.random()*20)+'px';
  bgH.appendChild(h);
}

let noCount=0;
function handleNo(){
  noCount++;
  const no=document.getElementById('btnNo');
  const yes=document.getElementById('btnYes');
  no.style.transition='all 0.4s ease';
  no.style.opacity='0';
  no.style.transform='scale(0)';
  setTimeout(()=>{no.style.display='none';},400);
  const sz=20+noCount*8, pd=16+noCount*6;
  yes.style.fontSize=sz+'px';
  yes.style.padding=pd+'px '+(pd*2)+'px';
  yes.style.boxShadow=`0 ${8+noCount*4}px ${25+noCount*10}px rgba(255,77,141,${Math.min(0.4+noCount*0.1,0.9)})`;
}

function handleYes(){
  const p1=document.getElementById('page1');
  const p2=document.getElementById('page2');
  p1.style.opacity='0';
  p1.style.pointerEvents='none';
  setTimeout(()=>{ p1.style.display='none'; p2.classList.add('active'); initP2(); tryPlayAudio(); },600);
}

function tryPlayAudio(){
  const hint=document.getElementById('audio-hint');
  const yt=document.getElementById('ytPlayer');
  if(yt){ yt.style.display='block'; hint.style.display='none'; }
}

function initP2(){
  const p2=document.getElementById('page2');
  // Stars
  for(let i=0;i<60;i++){
    const s=document.createElement('div');
    s.className='star';
    s.style.left=Math.random()*100+'%';
    s.style.top=Math.random()*100+'%';
    s.style.animationDuration=(2+Math.random()*4)+'s';
    s.style.animationDelay=(-Math.random()*4)+'s';
    p2.appendChild(s);
  }
  // Petals
  const pe=['🌸','🌺','🌷','💮','🌼'];
  for(let i=0;i<22;i++){
    const p=document.createElement('div');
    p.className='petal';
    p.textContent=pe[Math.floor(Math.random()*pe.length)];
    p.style.left=Math.random()*100+'%';
    p.style.fontSize=(14+Math.random()*18)+'px';
    p.style.animationDuration=(5+Math.random()*7)+'s';
    p.style.animationDelay=(-Math.random()*8)+'s';
    p2.appendChild(p);
  }
  // Sparkles
  const sp=['✨','⭐','💫','🌟','💎'];
  for(let i=0;i<14;i++){
    const s=document.createElement('div');
    s.className='sparkle';
    s.textContent=sp[Math.floor(Math.random()*sp.length)];
    s.style.left=Math.random()*90+5+'%';
    s.style.top=Math.random()*90+5+'%';
    s.style.animationDuration=(1.5+Math.random()*2.5)+'s';
    s.style.animationDelay=(-Math.random()*3)+'s';
    p2.appendChild(s);
  }
  // Confetti
  const cc=['#ff4d8d','#ff80b5','#ffb3d9','#c084fc','#fb7185','#fcd34d'];
  for(let i=0;i<30;i++){
    const c=document.createElement('div');
    c.className='cfall';
    c.style.left=Math.random()*100+'%';
    c.style.background=cc[Math.floor(Math.random()*cc.length)];
    c.style.animationDuration=(4+Math.random()*6)+'s';
    c.style.animationDelay=(-Math.random()*8)+'s';
    c.style.width=(5+Math.random()*8)+'px';
    c.style.height=(5+Math.random()*8)+'px';
    p2.appendChild(c);
  }
}

// Try music on load
window.addEventListener('click', tryPlayAudio, {once:true});
</script>
